server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${USER_DB_URL:jdbc:mysql://localhost:3306/guo_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${USER_DB_USERNAME:root}
    password: ${USER_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.test.guo.common.event
        spring.json.value.default.type: com.test.guo.common.event.UserCreatedEvent

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yaml
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
          dept-service:
            connectTimeout: 2000
            readTimeout: 3000
    sentinel:
      eager: true
  config:
    import: optional:nacos:user-service.yaml

feign:
  sentinel:
    enabled: true

mybatis-plus:
  type-aliases-package: com.test.guo.user.entity
  configuration:
    map-underscore-to-camel-case: true
