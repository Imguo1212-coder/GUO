server:
  port: 8084

spring:
  application:
    name: behavior-service

  mongodb:
    uri: ${BEHAVIOR_MONGO_URL:mongodb://127.0.0.1:27017/guo_behavior}

  data:
    mongodb:
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: behavior-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.test.guo.common.event
        spring.json.value.default.type: com.test.guo.common.event.UserBehaviorEvent
    listener:
      ack-mode: record
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}



